'999':
  run_type: 'train' # [arch_testing, train, test]
  config:
    animat: './config/animat_swimming.yaml'
    arena: './config/arena_water.yaml'
    simulation: './config/simulation.yaml'
  RL:
    localFeedback: 'dnn1'
    normWrapper: True
    RewardFnc: './config/RewardFnc_params/reward571.yaml'
    randomInitDrive: [1.5, 3.0]
    useEarlyTerm: False
    useRandStartCondPhases: 9
    episodes_per_training: 10_000 
    action_choice: ['DRIVE', 'STRETCH']
    observation_choice: ['VELOCITIES', 'JOINT_POSITION','PHASES', 'JOINT_VEL'] # add more here!
    phase_preprocessing: "sin" # [sin, cos, mod]
    policy_network:
      arch: [128, 128]
      act_fn: "Tanh" # must be valid activation function [Tanh, ReLU]
    PPOparams: './config/PPO_params/PPO_1_old_lr.yaml'
    target_velocity: [0.2, 0.0] # [x , y]
    sample_init_velocity_from_speed_range: [0.0, 0.35]
  frames_per_action: 2
