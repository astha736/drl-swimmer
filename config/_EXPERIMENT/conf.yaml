# Curated historical DRL configurations.
# Kept because they match recovered successful result summaries or the stable demo pipeline.
'999':
  run_type: train
  config:
    animat: config/_ANIMAT/animat_swimming.yaml
    arena: config/_ARENA//arena_water.yaml
    simulation: config/_SIMULATION/simulation.yaml
    drive: 2.5
  RL:
    normWrapper: false
    randomInitDrive:
    - 1.5
    - 3.0
    RewardFnc: ./config/RewardFnc_params/reward583.yaml
    useEarlyTerm: false
    useRandStartCondPhases: 9
    episodes_per_training: 10000
    action_choice:
    - DRIVE
    - STRETCH
    observation_choice:
    - VELOCITIES
    - JOINT_POSITION
    - PHASES
    - JOINT_VEL
    phase_preprocessing: sin
    policy_network:
      arch:
      - 128
      - 128
      act_fn: Tanh
    PPOparams: ./config/PPO_params/PPO_mini.yaml
    target_velocity:
    - 0.2
    - 0.0
    sample_init_velocity_from_speed_range:
    - 0.0
    - 0.35
  frames_per_action: 2
